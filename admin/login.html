<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login – Aryans Resource Portal</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/admin.css">
  <link rel="icon" href="../assets/img/logo.png">
</head>
<body class="admin-login-body">

  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <a href="../index.html" class="logo-wrapper" style="justify-content:center;">
          <div class="logo-img-container" style="width:64px;height:64px;">
            <img src="../assets/img/logo.png" alt="Aryans International School" style="width:64px;height:64px;">
            <div class="logo-ring"></div>
            <div class="logo-glow"></div>
          </div>
        </a>
        <h2 style="margin-top:var(--space-4);font-size:1.15rem;font-weight:700;color:var(--primary-900);">Aryans International School</h2>
        <p style="font-size:0.78rem;color:var(--gray-400);text-transform:uppercase;letter-spacing:0.08em;font-weight:600;">Admin Panel</p>
      </div>

      <h1 class="login-title">Admin Login</h1>
      <p class="login-subtitle">Sign in to manage resources and content.</p>

      <form id="login-form">
        <div class="form-group">
          <label for="login-email">Email Address</label>
          <div class="input-icon-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22 6 12 13 2 6"/></svg>
            <input type="email" id="login-email" placeholder="admin@school.com" required>
          </div>
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <div class="input-icon-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            <input type="password" id="login-password" placeholder="Enter your password" required>
          </div>
        </div>
        <div id="login-error" class="login-error" style="display:none;"></div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%;margin-top:var(--space-4);" id="login-btn">Sign In</button>
      </form>

      <div class="login-footer">
        <a href="../index.html">&larr; Back to Portal</a>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

  <script src="../js/firebase-config.js"></script>
  <script>
    // If already logged in, redirect
    auth.onAuthStateChanged(user => {
      if (user) window.location.href = 'dashboard.html';
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const errorEl = document.getElementById('login-error');
      const btn = document.getElementById('login-btn');

      errorEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        await auth.signInWithEmailAndPassword(email, password);
        window.location.href = 'dashboard.html';
      } catch (err) {
        errorEl.textContent = 'Invalid email or password. Please try again.';
        errorEl.style.display = 'block';
      }

      btn.disabled = false;
      btn.textContent = 'Sign In';
    });
  </script>
</body>
</html>
